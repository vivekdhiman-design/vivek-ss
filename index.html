<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVC Notepad App</title>
  <link rel="stylesheet" href="src/styles/styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">MVC JavaScript Project</p>
      <h1>Notepad Application</h1>
      <p>
        A simple notepad app built with a clean MVC structure:
        Model, View, and Controller.
      </p>
    </section>

    <section class="editor-card">
      <div class="form-group">
        <label for="noteTitle">Note Title</label>
        <input id="noteTitle" type="text" placeholder="Enter note title" />
      </div>

      <div class="form-group">
        <label for="noteContent">Note Content</label>
        <textarea id="noteContent" rows="8" placeholder="Write your note here..."></textarea>
      </div>

      <div class="actions">
        <button id="saveNoteBtn">Save Note</button>
        <button id="clearFormBtn" class="secondary">Clear</button>
      </div>
    </section>

    <section class="notes-section">
      <h2>Saved Notes</h2>
      <div id="notesList" class="notes-list"></div>
    </section>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
