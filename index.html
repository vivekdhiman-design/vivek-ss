<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVC Notepad App</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <main class="app-container">
    <section class="app-card">
      <header class="app-header">
        <h1>MVC Notepad App</h1>
        <p>A simple notepad application built using the Model-View-Controller pattern.</p>
      </header>

      <section class="note-form" aria-label="Create a note">
        <input id="note-title" type="text" placeholder="Note title" />
        <textarea id="note-content" placeholder="Write your note here..."></textarea>
        <button id="save-note-btn">Save Note</button>
      </section>

      <section class="notes-section" aria-label="Saved notes">
        <h2>Saved Notes</h2>
        <div id="notes-list" class="notes-list"></div>
      </section>
    </section>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
